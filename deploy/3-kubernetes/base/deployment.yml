apiVersion: apps/v1
kind: Deployment
metadata:
  name: mi-aplicacion-deployment
  labels:
    app: mi-aplicacion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mi-aplicacion
  template:
    metadata:
      labels:
        app: mi-aplicacion
    spec:
      containers:
      - name: app
        image: mi-aplicacion:latest
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 50m
        ports:
        - name: http
          containerPort: 3000
        envFrom:
        - configMapRef:
            name: mi-aplicacion-config
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: mi-aplicacion-config
              key: PROJECT_PORT
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 25
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 4
