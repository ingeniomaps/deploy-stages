# Blue-Green Deployment: Blue Stack
# Usage: docker compose -f docker/docker-compose.blue.yml --env-file .env up -d
# Logs: stdout; Docker rotates via json-file (max-size 10m, keep 7 files).

services:
  nginx:
    image: nginx:1.29.5-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-${PROJECT_NAME}}-nginx-blue-green
    restart: always
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '7'
    ports:
      - '${PORTS:-${PROJECT_PORT}:80}'
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/entrypoint.sh:/docker-entrypoint-blue-green.sh:ro
      - ../projects/${PROJECT_NAME}:/etc/nginx/conf.d/project:ro
    entrypoint: ['/bin/sh', '/docker-entrypoint-blue-green.sh']
    command: ['nginx', '-g', 'daemon off;']
    environment:
      - PROJECT_NAME=${PROJECT_NAME}
      - PROJECT_PORT=${PROJECT_PORT}
    depends_on:
      - app-blue
    networks:
      default:
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost/health'
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  app-blue:
    hostname: ${PROJECT_NAME}-blue
    restart: always
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '7'
    image: ${PROJECT_IMAGE}:${PROJECT_VERSION:-latest}
    expose:
      - ${PROJECT_PORT}
    environment:
      PORT: ${PROJECT_PORT}
      DEPLOYMENT_COLOR: blue
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:${PROJECT_PORT}${HEALTH_PATH}'
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      default:

networks:
  default:
    name: ${NETWORK}
    external: true
