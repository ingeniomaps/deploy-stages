apiVersion: apps/v1
kind: Deployment
metadata:
  # El nombre base se reescribe en tiempo de deploy a "${PROJECT_NAME}-deployment"
  name: rx-mi-aplicacion-deployment
spec:
  template:
    metadata:
      annotations:
        app.k8s/managed: "true"
    spec:
      containers:
      - name: app
        # Ejemplo de recursos para produccion; ajustar en cada proyecto.
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

