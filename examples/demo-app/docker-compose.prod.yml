# Complemento de producción: se fusiona con deploy/simple-compose/docker-compose.yml.
# Uso: make deploy-simple (por defecto o DOCKER_COMPOSE_APP=app/docker-compose.prod.yml en .env)

services:
  app:
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://127.0.0.1:${PROJECT_PORT}/health'
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
